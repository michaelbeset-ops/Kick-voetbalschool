<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KICK App | Ouder & Admin Portaal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Anton&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:#FAFAFA;}
  .kapp,.kapp *{font-family:Inter,system-ui,sans-serif;}
  .kapp button{font-family:inherit;cursor:pointer;}
  .kapp input,.kapp textarea,.kapp select{font-family:inherit;}
  .kapp ::-webkit-scrollbar{width:10px;height:10px;}
  .kapp ::-webkit-scrollbar-thumb{background:#c9cec9;border-radius:8px;}
  .kapp ::-webkit-scrollbar-track{background:transparent;}
  @keyframes kspin{to{transform:rotate(360deg);}}
  @keyframes kslide{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  @keyframes kfade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes kpop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
  @keyframes kconf{to{transform:translateY(110vh) rotate(640deg);}}
  @keyframes kbar{from{width:0;}}
  .kadm-shell{display:flex;min-height:100vh;background:#FAFAFA;}
  .kadm-side{width:246px;flex:none;background:#0A0A0A;color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .kadm-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .kadm-content{flex:1;overflow:auto;}
  .kadm-nav{display:flex;flex-direction:column;}
  @media(max-width:960px){
    .kadm-shell{flex-direction:column;}
    .kadm-side{width:100%;height:auto;position:sticky;top:0;z-index:30;}
    .kadm-nav{flex-direction:row;overflow-x:auto;}
    .kadm-navlabel{display:none;}
    .kadm-main{height:auto;overflow:visible;}
    .kadm-content{overflow:visible;}
    .kadm-brandsub{display:none;}
  }
  .kpar-shell{display:flex;min-height:100vh;background:#F1F4F1;}
  .kpar-side{width:236px;flex:none;background:#fff;border-right:1px solid #E7E9E7;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:20;}
  .kpar-main{flex:1;min-width:0;}
  .kpar-nav{display:flex;flex-direction:column;gap:4px;}
  @media(max-width:820px){
    .kpar-side{position:fixed;bottom:0;left:0;right:0;top:auto;width:auto;height:auto;flex-direction:row;border-right:none;border-top:1px solid #E7E9E7;box-shadow:0 -6px 20px rgba(0,0,0,.06);}
    .kpar-sidehead{display:none;}
    .kpar-nav{flex-direction:row;gap:0;justify-content:space-around;width:100%;}
    .kpar-navtext{font-size:10px;}
    .kpar-pad{padding-bottom:84px;}
  }
  .ksplit{display:grid;grid-template-columns:min(54%,580px) 1fr;min-height:100vh;}
  @media(max-width:840px){.ksplit{grid-template-columns:1fr;}.ksplit-visual{display:none;}}
  .kgrid-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  @media(max-width:1100px){.kgrid-kpi{grid-template-columns:repeat(2,1fr);}}
  .kgrid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}
  @media(max-width:900px){.kgrid-2{grid-template-columns:1fr;}}
  .kgrid-childs{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
  .kgrid-prog{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .khide-sm{display:table-cell;}
  @media(max-width:760px){.khide-sm{display:none;}}
  .kgroep-grid{display:grid;grid-template-columns:minmax(220px,1fr) 2.4fr;gap:16px;align-items:start;}
  @media(max-width:700px){.kgroep-grid{grid-template-columns:1fr;}}
  @media(max-width:600px){
    .kapp input,.kapp select,.kapp textarea{font-size:16px!important;}
  }
  .kapp [data-chip]{touch-action:none;}
  .kapp [data-chip].kchip-picked{outline:2px solid #0B6E2C;outline-offset:1px;box-shadow:0 4px 14px rgba(11,110,44,.35)!important;}
  .kapp [data-dropzone].kzone-target{outline:2px dashed #0B6E2C;outline-offset:2px;background:#F3FAF4!important;}
</style>
</head>
